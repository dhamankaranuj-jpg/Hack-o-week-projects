<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Quiz App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Poppins;
}

/* 🔥 BACKGROUND IMAGE */
body {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url("https://images.unsplash.com/photo-1519389950473-47ba0277781c");
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* GLASS EFFECT QUIZ BOX */
.quiz-box {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding: 25px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

/* TITLE */
h2 {
    text-align: center;
    color: #38bdf8;
    text-shadow: 0 0 10px #38bdf8;
}

/* QUESTION */
#question {
    margin: 15px 0;
}

/* OPTIONS */
.option {
    display: block;
    background: rgba(0,0,0,0.5);
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.option:hover {
    background: #38bdf8;
    color: black;
}

/* BUTTON */
.btn {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
    background: #38bdf8;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* PROGRESS */
.progress {
    height: 5px;
    background: #334155;
    margin-bottom: 10px;
    border-radius: 10px;
}

.progress-bar {
    height: 5px;
    background: #38bdf8;
    width: 0%;
    border-radius: 10px;
}

/* TIMER */
.timer {
    text-align: right;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="quiz-box">
    <h2>🧠 Smart Quiz</h2>

    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="timer">⏱ Time: <span id="time">10</span>s</div>

    <div id="question"></div>
    <div id="options"></div>

    <button class="btn" onclick="nextQuestion()">Next</button>
</div>

<script>
const quiz = [
    {
        q: "What is HTML?",
        options: ["Programming Language", "Markup Language", "Database", "OS"],
        answer: 1
    },
    {
        q: "CSS is used for?",
        options: ["Logic", "Styling", "Database", "Server"],
        answer: 1
    },
    {
        q: "JavaScript is?",
        options: ["Language", "Browser", "Hardware", "Compiler"],
        answer: 0
    }
];

let index = 0;
let score = 0;
let time = 10;
let timer;

function loadQuestion() {
    clearInterval(timer);
    time = 10;
    document.getElementById("time").innerText = time;

    let q = quiz[index];
    document.getElementById("question").innerText = q.q;

    let optionsHTML = "";
    q.options.forEach((opt, i) => {
        optionsHTML += `<div class="option" onclick="checkAnswer(${i})">${opt}</div>`;
    });

    document.getElementById("options").innerHTML = optionsHTML;

    updateProgress();

    timer = setInterval(() => {
        time--;
        document.getElementById("time").innerText = time;

        if (time === 0) {
            nextQuestion();
        }
    }, 1000);
}

function checkAnswer(i) {
    if (i === quiz[index].answer) score++;
    nextQuestion();
}

function nextQuestion() {
    index++;
    if (index < quiz.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function updateProgress() {
    let percent = (index / quiz.length) * 100;
    document.getElementById("progressBar").style.width = percent + "%";
}

function showResult() {
    document.querySelector(".quiz-box").innerHTML = `
        <h2>🎉 Quiz Finished</h2>
        <p>Your Score: ${score} / ${quiz.length}</p>
        <button class="btn" onclick="location.reload()">Restart</button>
    `;
}

loadQuestion();
</script>

</body>
</html>
