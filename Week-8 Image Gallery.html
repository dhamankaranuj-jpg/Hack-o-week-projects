<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Poppins;
}

body {
    background: #0b1120;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px;
}

header h1 {
    font-size: 2rem;
    color: #38bdf8;
}

/* FILTER BUTTONS */
.filters {
    text-align: center;
    margin-bottom: 20px;
}

.filters button {
    margin: 5px;
    padding: 8px 15px;
    border: none;
    background: #1e293b;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

.filters button:hover {
    background: #38bdf8;
    color: black;
}

/* GALLERY GRID */
.gallery {
    column-count: 3;
    column-gap: 15px;
    padding: 20px;
}

@media(max-width: 900px){
    .gallery { column-count: 2; }
}

@media(max-width: 500px){
    .gallery { column-count: 1; }
}

/* IMAGE CARD */
.image {
    position: relative;
    margin-bottom: 15px;
    overflow: hidden;
    border-radius: 15px;
}

.image img {
    width: 100%;
    border-radius: 15px;
    transition: 0.4s;
}

/* HOVER OVERLAY */
.overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.6);
    padding: 10px;
    opacity: 0;
    transition: 0.3s;
}

.image:hover img {
    transform: scale(1.1);
}

.image:hover .overlay {
    opacity: 1;
}

/* LIGHTBOX */
.lightbox {
    position: fixed;
    top: 0;
    left: 0;
    background: rgba(0,0,0,0.9);
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
}

.lightbox img {
    max-width: 90%;
    max-height: 80%;
}

.close {
    position: absolute;
    top: 20px;
    right: 40px;
    font-size: 30px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <h1>📸 Pro Image Gallery</h1>
</header>

<div class="filters">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('nature')">Nature</button>
    <button onclick="filter('tech')">Tech</button>
</div>

<div class="gallery" id="gallery">

    <!-- IMAGE -->
    <div class="image" data-category="nature">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" onclick="openImage(this.src)">
        <div class="overlay">Nature</div>
    </div>

    <div class="image" data-category="tech">
        <img src="https://images.unsplash.com/photo-1518770660439-4636190af475" onclick="openImage(this.src)">
        <div class="overlay">Technology</div>
    </div>

    <div class="image" data-category="nature">
        <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e" onclick="openImage(this.src)">
        <div class="overlay">Nature</div>
    </div>

    <div class="image" data-category="tech">
        <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c" onclick="openImage(this.src)">
        <div class="overlay">Technology</div>
    </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeImage()">×</span>
    <img id="lightImg">
</div>

<script>
function filter(category) {
    let items = document.querySelectorAll(".image");

    items.forEach(item => {
        if (category === "all" || item.dataset.category === category) {
            item.style.display = "block";
        } else {
            item.style.display = "none";
        }
    });
}

function openImage(src) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightImg").src = src;
}

function closeImage() {
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
