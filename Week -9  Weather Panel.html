<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherPro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Poppins;
}

body {
    background: #0b1120;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #020617;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 30px;
    color: #38bdf8;
}

.sidebar a {
    display: block;
    padding: 10px;
    margin: 10px 0;
    color: white;
    text-decoration: none;
    border-radius: 10px;
}

.sidebar a:hover {
    background: #1e293b;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* TOP SEARCH */
.search {
    margin-bottom: 20px;
}

.search input {
    width: 100%;
    padding: 12px;
    border-radius: 20px;
    border: none;
    background: #1e293b;
    color: white;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
}

/* CARD */
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 20px;
}

/* MAIN WEATHER */
.main-weather {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.temp {
    font-size: 60px;
    font-weight: bold;
}

/* HOURLY */
.hourly {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}

/* SMALL CARDS */
.city {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    margin: 10px 0;
    background: #020617;
    border-radius: 10px;
}

/* FORECAST */
.forecast div {
    display: flex;
    justify-content: space-between;
    margin: 8px 0;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🌦 WeatherPro</h2>
    <a href="#">Dashboard</a>
    <a href="#">Map Radar</a>
    <a href="#">Saved Locations</a>
    <a href="#">Calendar</a>
    <a href="#">Settings</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="search">
        <input type="text" placeholder="Search city...">
    </div>

    <div class="grid">

        <!-- LEFT -->
        <div>

            <!-- MAIN WEATHER -->
            <div class="card">
                <div class="main-weather">
                    <div>
                        <h2>Mumbai, India</h2>
                        <p>Thursday</p>
                        <p>🌧 Heavy Rain</p>
                    </div>
                    <div class="temp">28°C</div>
                </div>
            </div>

            <!-- HOURLY -->
            <div class="card">
                <h3>Today's Forecast</h3>
                <div class="hourly">
                    <div>Now<br>28°</div>
                    <div>10:00<br>28°</div>
                    <div>11:00<br>29°</div>
                    <div>12:00<br>29°</div>
                    <div>13:00<br>30°</div>
                </div>
            </div>

        </div>

        <!-- RIGHT -->
        <div>

            <!-- OTHER CITIES -->
            <div class="card">
                <h3>Other Cities</h3>

                <div class="city">
                    <span>Delhi</span>
                    <span>35°</span>
                </div>

                <div class="city">
                    <span>Bangalore</span>
                    <span>24°</span>
                </div>

                <div class="city">
                    <span>Chennai</span>
                    <span>31°</span>
                </div>

            </div>

            <!-- 7 DAY -->
            <div class="card">
                <h3>7-Day Forecast</h3>

                <div class="forecast">
                    <div><span>Fri</span><span>29°</span></div>
                    <div><span>Sat</span><span>31°</span></div>
                    <div><span>Sun</span><span>32°</span></div>
                    <div><span>Mon</span><span>33°</span></div>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
