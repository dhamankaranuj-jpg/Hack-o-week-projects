<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #0f172a;
    color: white;
}

/* HEADER */
header {
    padding: 20px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    color: #38bdf8;
}

.search-box input {
    padding: 8px 15px;
    border-radius: 20px;
    border: none;
}

/* FILTER */
.filter {
    padding: 10px 50px;
}

.filter select {
    padding: 8px;
    border-radius: 10px;
}

/* GRID */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    padding: 30px 50px;
    gap: 20px;
}

/* CARD */
.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

/* TEXT */
.card h3 {
    margin: 10px 0;
}

.price {
    color: #38bdf8;
    font-weight: bold;
}

/* BUTTON */
.btn {
    display: block;
    margin-top: 10px;
    padding: 10px;
    background: #38bdf8;
    color: black;
    text-align: center;
    border-radius: 10px;
    cursor: pointer;
    text-decoration: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    background: #020617;
}
</style>
</head>

<body>

<header>
    <h1>🛍️ My Store</h1>

    <div class="search-box">
        <input type="text" id="search" placeholder="Search products...">
    </div>
</header>

<div class="filter">
    <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="electronics">Electronics</option>
        <option value="fashion">Fashion</option>
    </select>
</div>

<section class="products" id="productList">

    <!-- PRODUCT 1 -->
    <div class="card" data-category="electronics">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
        <h3>Smartphone</h3>
        <p class="price">₹15,000</p>
        <a class="btn">Buy Now</a>
    </div>

    <!-- PRODUCT 2 -->
    <div class="card" data-category="fashion">
        <img src="https://images.unsplash.com/photo-1521334884684-d80222895322">
        <h3>Stylish Shoes</h3>
        <p class="price">₹2,000</p>
        <a class="btn">Buy Now</a>
    </div>

    <!-- PRODUCT 3 -->
    <div class="card" data-category="electronics">
        <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
        <h3>Laptop</h3>
        <p class="price">₹55,000</p>
        <a class="btn">Buy Now</a>
    </div>

    <!-- PRODUCT 4 -->
    <div class="card" data-category="fashion">
        <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
        <h3>Watch</h3>
        <p class="price">₹3,500</p>
        <a class="btn">Buy Now</a>
    </div>

</section>

<footer>
    <p>© 2026 My Store | All Rights Reserved</p>
</footer>

<script>
// SEARCH FUNCTION
document.getElementById("search").addEventListener("keyup", function() {
    let value = this.value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let text = card.innerText.toLowerCase();
        card.style.display = text.includes(value) ? "block" : "none";
    });
});

// FILTER FUNCTION
document.getElementById("categoryFilter").addEventListener("change", function() {
    let value = this.value;
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        if (value === "all" || card.dataset.category === value) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
});
</script>

</body>
</html>
